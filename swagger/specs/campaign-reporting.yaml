      security:
        - BearerAuth: []
      servers:
        - url: 'https://backend.podscribe.ai/'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - advertisers
                - timeGrouping
              properties:
                formatting:
                  type: object
                  properties:
                    numberFormatting:
                      type: boolean
                      description: 'Smart-format as currency, percentage, or comma-separated values for readability.'
                    summary:
                      type: boolean
                      description: 'Include a report summary at the top of the report, featuring the Report Title, Advertiser, Publisher, and Dates'
                    totals:
                      type: boolean
                      description: Total all columns at the bottom of the report. Total reach will be queried separately.
                  description: Object to setup the formatting of CSV output.
                  example:
                    numberFormatting: true
                    summary: true
                advertisers:
                  type: array
                  items:
                    type: string
                  description: |
                    A single-item array containing the advertiser's name. Please include only one advertiser in this list.
                startDate:
                  type: string
                  default: null
                  description: |
                    Start date timestamp, e.g., 2023-10-10, default is 3 months ago.
                endDate:
                  type: string
                  default: null
                  description: |
                    End date timestamp, e.g., 2023-10-10, default is one week forward.
                fields:
                  type: array
                  items:
                    type: string
                  default: null
                  description: 'List of fields to include in the output. If none specified, all are included.'
                fieldsMapping:
                  type: object
                  default: null
                  description: Parameter to customize column headers in the CSV output.
                  example:
                    Day: timestamp
                    Publish Date: episode_upload
                ytSimulcastConv:
                  type: boolean
                  default: true
                  description: |
                    If checked, the audio conversion rate for simulcast buys will be applied
                    to the YouTube views of the corresponding YouTube ad, default true.
                includeYtSpend:
                  type: boolean
                  default: false
                  description: |
                    If disabled (default), spend is not calculated for:
                    - YouTube-only campaigns, and
                    - Simulcast campaigns with YouTube views only.
                    We cannot model YouTube performance without RSS impressions.
                attributionWindow:
                  type: number
                  default: 30
                  description: |
                    Days between converted_at and touched_at, default 30.
                attributionStreamingWindow:
                  type: number
                  default: 14
                  description: |
                    Days between converted_at and touched_at for streaming, default 14
                attributionModel:
                  type: string
                  default: multi_timedecay
                  description: |
                    Attribution model, default: multi_timedecay.
                  enum:
                    - first
                    - last
                    - multi_linear
                    - multi_timedecay
                excludeReferrers:
                  type: array
                  items:
                    type: string
                  default:
                    - email
                    - facebook
                    - tiktok
                    - instagram
                    - twitter
                  description: |
                    Referrers to exclude. <br>Default: \"email,facebook,tiktok,instagram,twitter\". <br>If you need to avoid excluding any referrers, please pass the empty array.
                excludeUtmMediums:
                  type: array
                  items:
                    type: string
                  default:
                    - email
                    - facebook
                    - fb
                    - tiktok
                    - sms
                    - social
                    - klaviyo
                    - youtube
                    - instagram
                    - ig
                  description: |
                    UTM mediums to exclude. <br>Default: \"email,facebook,fb,tiktok,sms,social,klaviyo,youtube,instagram,ig\". <br>If you need to avoid excluding any UTM mediums, please pass the empty array.
                excludeUtmSources:
                  type: array
                  items:
                    type: string
                  default:
                    - email
                    - facebook
                    - fb
                    - tiktok
                    - twitter
                    - klaviyo
                    - youtube
                    - instagram
                    - ig
                  description: |
                    UTM sources to exclude. <br>Default: \"email,facebook,fb,tiktok,twitter,klaviyo,youtube,instagram,ig\". <br>If you need to avoid excluding any UTM sources, please pass the empty array.
                excludePriorCustomers:
                  type: boolean
                  default: false
                  description: |
                    If checked, the results will exclude prior customers, default false.
                excludePriorVisitors:
                  type: boolean
                  default: false
                  description: |
                    If checked, the results will exclude prior visitors, default false.
                spendOnPublishDate:
                  type: boolean
                  default: true
                  description: |
                    Determines how spend is applied for episodic ad buys. <br>If enabled (default), spend is applied on the ad's publish date. <br>If disabled, spend is prorated based on impression delivery over the first 30 days of baked-in campaigns.
                useSettingsProfiles:
                  type: boolean
                  default: false
                  description: |
                    Enables the use of settings profiles for the request. <br>When set to `true`, the request will use the settings profile associated with the selected advertiser. <br>Any settings from the profile can still be overridden by explicitly provided request parameters.
                timeRangeConv:
                  type: boolean
                  default: false
                  description: |
                    If checked, the results will only include conversions from impressions in this time range, default false.
                timeGrouping:
                  type: string
                  default: day
                  description: |
                    Group impressions by day, week, or month, default day.
                  enum:
                    - day
                    - week
                    - month
                showIncrementalResults:
                  type: boolean
                  description: |
                    If true, incremental columns will be included in the output.
                incrementalDisplayType:
                  type: string
                  description: |
                    If true, incremental columns will be included in the output. Default is channel
                  enum:
                    - channel
                    - campaign
                useNonPurchasesRevenue:
                  type: boolean
                  description: |
                    Include revenue from custom events where `order_value` is non-zero.
                weekStartsOn:
                  type: string
                  description: |
                    The day of the week to start the week. Default is user settings, when not set - "sunday".
                  enum:
                    - monday
                    - sunday
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: ./schemas/FileProcessingTask.yaml
        '400':
          description: Invalid data
        '500':
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: ./schemas/Error.yaml
